name: Build & Deploy

on:
  push:
    branches:
      - main
      - staging

env:
  REGISTRY: docker.artodigital.id
  IMAGE: docker.artodigital.id/benjo

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Install docker-rollout (idempotent) — lets `app` do a rolling
            # swap instead of stop-then-start, so Traefik always has a
            # healthy backend and the site never 404s mid-deploy.
            if [ ! -f ~/.docker/cli-plugins/docker-rollout ]; then
              mkdir -p ~/.docker/cli-plugins
              curl -fsSL https://raw.githubusercontent.com/wowu/docker-rollout/main/docker-rollout -o ~/.docker/cli-plugins/docker-rollout
              chmod +x ~/.docker/cli-plugins/docker-rollout
            fi

            # Pull latest images from registry
            IMAGE_TAG=latest docker compose -f docker-compose.yaml pull app

            # No separate migrate step: entrypoint.sh runs `artisan migrate --force`
            # on every container start, so the new `app` container migrates as
            # part of the rollout below, before traffic swings over to it.

            # Zero-downtime rollout for the web-facing app service
            IMAGE_TAG=latest docker rollout -f docker-compose.yaml app

            # Worker/scheduler/reverb have no incoming HTTP traffic, a brief restart is fine
            IMAGE_TAG=latest docker compose -f docker-compose.yaml up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f

